name: daily_history
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.1

####################### DEPENDENCIES #######################
dependencies:
  flutter:
    sdk: flutter

  #firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0

  #design
  cupertino_icons: ^1.0.8

  #localization
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.5.3
  google_sign_in: ^7.0.0
  flutter_svg: ^2.2.1
  firebase_database: ^11.3.10
  firebase_app_check: ^0.3.2+10

  url_launcher: ^6.3.0
  skeletonizer: ^2.1.0+1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.7
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  cached_network_image: ^3.4.1
  firebase_analytics: ^11.6.0
  firebase_messaging: ^15.2.10
  share_plus: ^12.0.2
  firebase_crashlytics: ^4.3.10
  firebase_performance: ^0.10.1+10

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^4.0.0

flutter:
  generate: true #used for l10n
  uses-material-design: true

  assets:
     - assets/images/logo_google.svg
     #- assets/images/splash.png
     - assets/imageLoader.gif
     - assets/images/test.jpeg

  fonts:
    - family: icons
      fonts:
        - asset: assets/fonts/icons/icons.ttf
    - family: lora
      fonts:
        - asset: assets/fonts/Lora-VariableFont_wght.ttf
          weight: 400
          style: normal
        - asset: assets/fonts/Lora-Italic-VariableFont_wght.ttf
          weight: 400
          style: italic
    - family: abhaya
      fonts:
        - asset: assets/fonts/AbhayaLibre-ExtraBold.ttf
          weight: 800
    - family: poppins
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: arial
      fonts:
        - asset: assets/fonts/ArialRegular.ttf
    - family: playfair
      fonts:
        - asset: assets/fonts/Playfair.ttf
